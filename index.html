body {

.hero {

.box {

img {

}

/* 成員區 */
.grid {

.member {

    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);

}

.member:hover {
    transform: scale(1.05);
}

.member img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.member p {
    font-weight: bold;
    margin: 10px;

.popup {

    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    width: 70%;
    max-width: 600px;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}
</style>
