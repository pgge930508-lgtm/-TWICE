<style>
body {
    margin: 0;

}

/* 封面 */
.hero {

}

.hero h1 {
    font-size: 70px;

.btn {
    padding: 12px 20px;
    background: hotpink;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 20px;
    text-decoration: none;
}

/* 區塊 */
section {
    padding: 50px;
    text-align: center;
}

.box {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 75%;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

img {
    width: 100%;
    border-radius: 10px;
}

/* 成員區 */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.member {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.member:hover {
    transform: scale(1.05);
}

.member img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.member p {
    font-weight: bold;
    margin: 10px;
}

/* 彈出視窗 */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    width: 70%;
    max-width: 600px;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}
</style>
