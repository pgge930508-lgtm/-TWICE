<!DOCTYPE html>

<style>
body {
    margin: 0;

    background: #fff5f7;
}

/* 封面 */
.hero {

.btn {

    margin-top: 20px;

}

}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);

}
.member {
    background: white;
    padding: 10px;
    border-radius: 10px;
}
.aaa {

}

<section id="members">

<h2>TWICE 成員介紹</h2>

<div class="grid">
